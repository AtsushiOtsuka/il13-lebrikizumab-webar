<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>il13-practice.glb 向き調整プレビュー（AR不要）</title>
    <style>
      html, body { margin: 0; height: 100%; background: #11151a; color: #cdd6e0; font-family: system-ui, 'Zen Kaku Gothic New', sans-serif; }
      #info { position: fixed; top: 10px; left: 12px; font-size: 13px; opacity: .85; line-height: 1.6; max-width: 60vw; }
      a { color: #7fb0ff; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      <b>向き調整プレビュー</b>（カメラ/マーカー不要）<br />
      右下のパネルで回転・大きさ・自転を調整 → 自動保存され<br />
      <b>AR本番にも反映</b>されます。<br />
      ドラッグ=視点回転 / ホイール=ズーム<br />
      本番AR: <a href="./index.html">index.html</a>
    </div>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { createSceneLights } from "./src/scene.js";
      import { loadMoleculeModel } from "./src/model.js";
      import { createTuner } from "./src/tuner.js";

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x11151a);
      const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.001, 100);
      camera.position.set(0, 0.4, 3.0); // モデルは最大辺=1に正規化されているので少し引く

      createSceneLights().forEach((light) => scene.add(light));

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      const clock = new THREE.Clock();
      const model = await loadMoleculeModel();
      model.setVisible(true);
      scene.add(model.root);

      // AR本番と同じ調整パネルを表示（設定は localStorage 共有）
      createTuner({
        initial: model.getSettings(),
        onChange: (s) => model.applySettings(s),
      });

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      renderer.setAnimationLoop(() => {
        const delta = Math.min(clock.getDelta(), 0.05);
        model.update(delta, clock.elapsedTime);
        controls.update();
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
