<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>il13-practice.glb プレビュー（AR不要）</title>
    <style>
      html, body { margin: 0; height: 100%; background: #11151a; color: #cdd6e0; font-family: system-ui, sans-serif; }
      #info { position: fixed; top: 10px; left: 12px; font-size: 13px; opacity: .8; line-height:1.5; }
      a { color:#7fb0ff; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      glbプレビュー（カメラ/マーカー不要）<br />
      ドラッグ=回転 / ホイール=ズーム / 右ドラッグ=移動<br />
      本番AR: <a href="./index.html">index.html</a>
    </div>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x11151a);
      const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 100);

      // 本番(scene.js)と近い照明
      scene.add(new THREE.HemisphereLight(0xdffbff, 0x122329, 1.4));
      const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(0.4, 1.2, 1.3); scene.add(key);
      const rim = new THREE.PointLight(0x4f8cff, 0.9, 30); rim.position.set(-2, 1.6, 2); scene.add(rim);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      new GLTFLoader().load("./assets/il13-practice.glb", (gltf) => {
        const model = gltf.scene;
        // 中心合わせ＆カメラフレーミング
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        scene.add(model);
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(0, maxDim * 0.2, maxDim * 1.8);
        controls.target.set(0, 0, 0);
        controls.update();
      }, undefined, (err) => {
        document.getElementById("info").innerHTML = "読み込み失敗: " + err;
      });

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
      renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
    </script>
  </body>
</html>
